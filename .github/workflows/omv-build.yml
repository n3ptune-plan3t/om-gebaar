name: OpenMandriva Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify spec file
        run: |
          # Check for spec files
          find . -name "*.spec" -type f
          # Make sure gebaar-libinput-fork.spec exists and is valid
          if [ ! -f gebaar-libinput-fork.spec ]; then
            echo "ERROR: gebaar-libinput-fork.spec not found"
            exit 1
          fi

      - name: Install packaging tools
        run: |
          dnf install -y packaging-tools dnf-utils

      - name: Prepare package directory
        run: |
          # Follow the official OMV guide - create ~/abf/[package-name]
          mkdir -p ~/abf/gebaar-libinput-fork
          cp gebaar-libinput-fork.spec ~/abf/gebaar-libinput-fork/
          # Copy patch files if they exist
          if [ -f fix-stdcxxfs.patch ]; then
            cp fix-stdcxxfs.patch ~/abf/gebaar-libinput-fork/
          fi
          cd ~/abf/gebaar-libinput-fork
          ls -la

      - name: Install build dependencies
        run: |
          # Install the build dependencies from the spec file
          dnf builddep -y ~/abf/gebaar-libinput-fork/gebaar-libinput-fork.spec

      - name: Build with abb
        run: |
          cd ~/abf/gebaar-libinput-fork
          abb build

      - name: Upload RPM Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-rpm
          path: ~/abf/gebaar-libinput-fork/RPMS/**/*.rpm

      - name: Upload Source RPM Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-srpm
          path: ~/abf/gebaar-libinput-fork/SRPMS/**/*.rpm

      - name: Check build log on failure
        if: failure()
        run: |
          echo "=== Build failed, showing logs ==="
          find ~/abf/gebaar-libinput-fork -name "*.buildlog" -exec cat {} \;
          echo "=== Directory contents ==="
          ls -la ~/abf/gebaar-libinput-fork/
