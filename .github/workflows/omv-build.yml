name: OpenMandriva Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Environment
        run: |
          # Install build tools and dependencies
          # rpmdevtools is optional now since we download sources directly
          dnf install -y rpm-build cmake ninja dnf-utils rpm-openmandriva-setup-build
          
          # Automatically install spec-defined dependencies (libinput, zlib, libudev, pkgconfig, etc.)
          dnf builddep -y gebaar-libinput-fork.spec

      - name: Prepare RPM Directory
        run: |
          # Create the standard RPM build tree in the home directory
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          cp gebaar-libinput-fork.spec ~/rpmbuild/SPECS/

      - name: Download Sources
        run: |
          # Download the source tarball directly from GitHub using curl
          cd ~/rpmbuild/SOURCES/
          curl -L -o v0.1.5.tar.gz https://github.com/9ary/gebaar-libinput-fork/archive/refs/tags/v0.1.5.tar.gz
          # Verify the download
          ls -lh v0.1.5.tar.gz

      - name: Execute Build
        run: |
          # -ba builds both the binary RPM and the source RPM
          rpmbuild -ba ~/rpmbuild/SPECS/gebaar-libinput-fork.spec

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-packages
          path: ~/rpmbuild/RPMS/*/*.rpm
