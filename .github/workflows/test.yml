name: Testing OpenMandriva binary package
on: [push, pull_request]

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker
      options: --privileged  # Required if your build needs special permissions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          # Sync repositories and install necessary tools
          dnf install -y rpm-build rpm-openmandriva-setup-build dnf-utils packaging-tools curl
          # Automatically install BuildRequires from your .spec file
          dnf builddep -y gebaar-libinput-fork.spec

      - name: Prepare RPM Environment
        run: |
          # 1. Create the standard RPM directory tree
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          
          # 2. Fetch the source into SOURCES folder
          # -L follows redirects, -o names it exactly what rpmbuild expects
          curl -L "https://github.com/9ary/gebaar-libinput-fork/archive/refs/tags/v0.1.5.tar.gz" -o ~/rpmbuild/SOURCES/v0.1.5.tar.gz
          
          # 3. Move your spec file to the SPECS folder
          cp gebaar-libinput-fork.spec ~/rpmbuild/SPECS/
          cp fix-stdcxxfs.patch ~/rpmbuild/SOURCES
          
      - name: Build znver1 RPM
        run: |
          # rpmbuild -ba: build all (binary and source)
          # --target znver1: optimize for your Ryzen 3250U
          rpmbuild -ba --target znver1 ~/rpmbuild/SPECS/gebaar-libinput-fork.spec
          
      - name: Upload znver1 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-znver1-rpms
          path: |
            /root/rpmbuild/RPMS/**/*.rpm
            /root/rpmbuild/SRPMS/*.src.rpm
