name: OpenMandriva Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          dnf install -y packaging-tools

      - name: Prepare package directory
        run: |
          # Follow the official OMV guide - create ~/abf/[package-name]
          mkdir -p ~/abf/gebaar-libinput-fork
          cp gebaar-libinput-fork.spec ~/abf/gebaar-libinput-fork/
          cd ~/abf/gebaar-libinput-fork
          # Also copy any other source files if needed
          cp -r . ~/abf/gebaar-libinput-fork/ 2>/dev/null || true

      - name: Build with abb
        run: |
          cd ~/abf/gebaar-libinput-fork
          abb build

      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-rpm
          path: ~/abf/gebaar-libinput-fork/RPMS/**/*.rpm

      - name: Upload Source RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-srpm
          path: ~/abf/gebaar-libinput-fork/SRPMS/**/*.rpm

      - name: Check build log
        if: failure()
        run: |
          if [ -f ~/abf/gebaar-libinput-fork/build.log ]; then
            cat ~/abf/gebaar-libinput-fork/build.log
          fi
